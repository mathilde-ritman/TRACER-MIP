# Mathilde Ritman 2025, config for performing INCUS-like cloud tracking on ICON

version_name: 'frozen'
select_data: ['cli','qg','qs','qh']
segment_data: ['cli','qg','qs','qh']
grid_spacing: 800  # in meter (for Latitude)
time_spacing: 1800 # seconds (= 30 mins)
# dz: 300

params_features: 
  position_threshold: 'weighted_diff' # how to choose position of feature comprised of multiple pixels
  sigma_threshold: 1 # standard deviation for intial filtering step used to smooth the feature data
  n_erosion_threshold: 0 # number of pixels by which to erode the identified features
  n_min_threshold: 27 # minimum number of contiguous pixels to define a feature
  target: "maximum"
  threshold: [0.00001, 0.0001, 0.001, 0.01] # kg/kg - choice used for tropics-wide experiment
  # threshold: [0.00001,]
  n_erosion_threshold: 0 # number of pixels by which to erode the identified features
  vertical_coord: 'air_pressure'
  # dz: 300 # (meters) assumes constant vertical spacing
  # PBC_flag: # whether to use periodic boundaries, and if so in which directions

params_segmentation:
  method: 'watershed'
  threshold: 0.00001 # kg/kg
  target: "maximum"
  seed_3D_flag: 'box'
  vertical_coord: 'air_pressure'
  # PBC_flag: # whether to use periodic boundaries, and if so in which directions

params_linking:
  # d_max: 33300 # set max search range (m)
  d_max: 100000
  extrapolate: 0
  order: 1
  memory: 0
  time_cell_min: 30 # seconds
  method_linking: 'predict'
  adaptive_stop: 1.0
  adaptive_step: 0.75
  vertical_coord: null # must be set as None when using 'dz'
  dz: 300 # (meters) assumes constant vertical spacing
  # PBC_flag: # whether to use periodic boundaries, and if so in which directions
  # min_h2=0, # to use for boundaries if using PBC flag for periodic boundary across longitude
  # max_h2=3600,
